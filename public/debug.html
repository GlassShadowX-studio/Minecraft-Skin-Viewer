function plane(f,tex,id,color){
  const[ox,oy,oz]=f.o,[ux,uy,uz]=f.u,[vx,vy,vz]=f.v,[u0,v0]=f.uv,[w,h]=f.s;
  let um=u0/64,uM=(u0+w)/64,vm=1-(v0+h)/64,vM=1-v0/64;
  if(f.f)[um,uM]=[uM,um];
  const g=new THREE.PlaneGeometry(w,h),p=g.attributes.position,uvs=g.attributes.uv;
  for(let i=0;i<p.count;i++){const x=p.getX(i),y=p.getY(i);uvs.setXY(i,um+(x/w+.5)*(uM-um),vm+(y/h+.5)*(vM-vm));}
  const m=new THREE.MeshBasicMaterial({map:tex,transparent:true,alphaTest:0.1,side:THREE.DoubleSide});
  const me=new THREE.Mesh(g,m);
  me.position.set(ox+w/2*ux+h/2*vx,oy+w/2*uy+h/2*vy,oz+w/2*uz+h/2*vz);
  me.setRotationFromQuaternion(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),new THREE.Vector3(...f.n)));
  // Add floating label sprite
  const ca=document.createElement('canvas');ca.width=64;ca.height=64;
  const cx=ca.getContext('2d');cx.fillStyle=color;cx.font='bold 36px monospace';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(String(id),32,32);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(ca),depthTest:false}));
  const[nx,ny,nz]=f.n;sp.position.copy(me.position).add(new THREE.Vector3(nx*2,ny, nz*2));sp.scale.set(2.5,2.5,1);
  me.add(sp);
  return me;
}

function part(faces,pivot,tex,startId){
  const g=new THREE.Group();
  faces.forEach((f,i)=>{
    let col='#ff0',id=startId+i;
    if(f.n[0]===-1)col='#0af';else if(f.n[0]===1)col='#f00';else if(f.n[2]===-1)col='#fa0';
    g.add(plane(f,tex,id,col));
  });
  g.position.set(...pivot);return g;
}

function buildModel(tex){
  const M=new THREE.Group();
  M.add(part(HEAD,[0,28,0],tex,1));
  M.add(part(BODY,[0,18,0],tex,7));
  M.add(part(RARM,[-(4+hw-0.1),24,0],tex,13));
  M.add(part(LARM,[(4+hw-0.1),24,0],tex,19));
  M.add(part(RLEG,[-2,12,0],tex,25));
  M.add(part(LLEG,[2,12,0],tex,31));
  M.position.y=-14;S.add(M);
}
